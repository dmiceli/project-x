<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Squeeze — prototype</title>
<style>
  html,body{margin:0;padding:0;background:#101418;height:100%;overflow:hidden;touch-action:none;-webkit-user-select:none;user-select:none}
  canvas{display:block;margin:0 auto;touch-action:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
// ---------- setup ----------
const W = 400, H = 700;
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
function resize(){
  const dpr = window.devicePixelRatio || 1;
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  cv.width = Math.round(W * s * dpr);
  cv.height = Math.round(H * s * dpr);
  cv.style.width = (W * s) + 'px';
  cv.style.height = (H * s) + 'px';
  ctx.setTransform(s * dpr, 0, 0, s * dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

let best = 0;
try { best = parseInt(localStorage.getItem('sqz_best') || '0', 10) || 0; } catch (e) {}

// ---------- constants ----------
const BX = 110, BY = 350;          // blob position (fixed)
const R_BIG = 42, R_SMALL = 15;
const AIR_MAX = 100;

// ---------- state ----------
let state = 'menu';                // menu | play | over
let holding = false;
let r = R_BIG, air = AIR_MAX, forcedBig = false;
let walls = [], particles = [], popups = [];
let score = 0, speed = 150, elapsed = 0;
let shake = 0, wob = 0;

function reset(){
  r = R_BIG; air = AIR_MAX; forcedBig = false;
  walls = []; particles = []; popups = [];
  score = 0; speed = 150; elapsed = 0;
  spawnWall(W + 260);
  state = 'play';
}

function spawnWall(x){
  const breather = Math.random() < 0.2;
  const margin = breather ? R_BIG * 2 + 34 : R_SMALL * 2 + 8 + Math.random() * 42;
  walls.push({x: x, w: 26, gap: margin, counted: false});
}

function addPopup(text, x, y, color){
  popups.push({text: text, x: x, y: y, t: 0, color: color || '#fff'});
}

function pop(){
  for (let i = 0; i < 26; i++) {
    const a = Math.random() * Math.PI * 2, sp = 60 + Math.random() * 240;
    particles.push({x: BX, y: BY, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, t: 0});
  }
  shake = 1;
  if (score > best) { best = score; try { localStorage.setItem('sqz_best', String(best)); } catch (e) {} }
  state = 'over';
}

// ---------- input ----------
window.addEventListener('pointerdown', function(e){
  e.preventDefault();
  if (state === 'menu') { reset(); holding = false; return; }
  if (state === 'over') { reset(); holding = false; return; }
  holding = true;
});
window.addEventListener('pointerup', function(){ holding = false; });
window.addEventListener('pointercancel', function(){ holding = false; });
window.addEventListener('keydown', function(e){
  if (e.code !== 'Space') return;
  if (state === 'menu' || state === 'over') { reset(); return; }
  holding = true;
});
window.addEventListener('keyup', function(e){ if (e.code === 'Space') holding = false; });

// ---------- update ----------
function update(dt){
  wob += dt;
  shake = Math.max(0, shake - dt * 3);

  for (let i = particles.length - 1; i >= 0; i--) {
    const q = particles[i];
    q.t += dt; q.x += q.vx * dt; q.y += q.vy * dt; q.vy += 300 * dt;
    if (q.t > 1.2) particles.splice(i, 1);
  }
  for (let i = popups.length - 1; i >= 0; i--) {
    popups[i].t += dt; popups[i].y -= 30 * dt;
    if (popups[i].t > 1.1) popups.splice(i, 1);
  }

  if (state !== 'play') return;
  elapsed += dt;

  // air meter: squeezing costs air, releasing refills it
  const squeezing = holding && !forcedBig;
  if (squeezing) {
    air -= 42 * dt;
    if (air <= 0) { air = 0; forcedBig = true; addPopup('OUT OF AIR!', BX, BY - 70, '#f87171'); }
  } else {
    air = Math.min(AIR_MAX, air + 65 * dt);
    if (forcedBig && air > 35) forcedBig = false;
  }

  // radius eases toward target
  const target = squeezing ? R_SMALL : R_BIG;
  r += (target - r) * Math.min(1, 10 * dt);

  // walls
  for (const wl of walls) wl.x -= speed * dt;
  if (walls.length && walls[walls.length - 1].x < W - 210) spawnWall(W + 30);
  while (walls.length && walls[0].x + walls[0].w < -40) walls.shift();

  for (const wl of walls) {
    const halfGap = wl.gap / 2;
    // overlapping the wall column horizontally?
    const overlapX = (BX + r > wl.x) && (BX - r < wl.x + wl.w);
    if (overlapX && r > halfGap - 0.5) { pop(); return; }
    if (!wl.counted && wl.x + wl.w < BX - r) {
      wl.counted = true;
      const clearance = halfGap - R_SMALL;
      if (clearance < 8) { score += 2; addPopup('TIGHT! +2', BX, BY - 70, '#ffd166'); }
      else { score += 1; }
      speed = Math.min(400, speed + 7);
    }
  }
}

// ---------- draw ----------
function drawBlob(){
  const wobble = Math.sin(wob * 9) * (r * 0.04);
  const squeezing = holding && !forcedBig && state === 'play';
  ctx.save();
  ctx.translate(BX, BY);
  // body
  ctx.fillStyle = squeezing ? '#7dd3fc' : '#38bdf8';
  ctx.beginPath();
  ctx.ellipse(0, 0, r + wobble, r - wobble, 0, 0, Math.PI * 2);
  ctx.fill();
  // face
  ctx.fillStyle = '#0c2436';
  const ey = -r * 0.18, ex = r * 0.35;
  if (squeezing) {
    ctx.lineWidth = 2.5; ctx.strokeStyle = '#0c2436';
    ctx.beginPath(); ctx.moveTo(-ex - 4, ey); ctx.lineTo(-ex + 4, ey); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ex - 4, ey); ctx.lineTo(ex + 4, ey); ctx.stroke();
    ctx.beginPath(); ctx.arc(0, r * 0.3, 3, 0, Math.PI * 2); ctx.fill();   // effort mouth
  } else {
    ctx.beginPath(); ctx.arc(-ex, ey, 3.2, 0, Math.PI * 2); ctx.arc(ex, ey, 3.2, 0, Math.PI * 2); ctx.fill();
    ctx.lineWidth = 2.5; ctx.strokeStyle = '#0c2436';
    ctx.beginPath(); ctx.arc(0, r * 0.2, r * 0.25, 0.15 * Math.PI, 0.85 * Math.PI); ctx.stroke(); // smile
  }
  ctx.restore();
}

function draw(){
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  if (shake > 0) ctx.translate((Math.random() - 0.5) * 12 * shake, (Math.random() - 0.5) * 12 * shake);

  ctx.fillStyle = '#101418'; ctx.fillRect(-20, -20, W + 40, H + 40);
  // subtle lane lines
  ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
  for (let y = 100; y < H; y += 100) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  // walls
  for (const wl of walls) {
    const halfGap = wl.gap / 2;
    ctx.fillStyle = '#34d399';
    ctx.fillRect(wl.x, -20, wl.w, BY - halfGap + 20);
    ctx.fillRect(wl.x, BY + halfGap, wl.w, H - (BY + halfGap) + 20);
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(wl.x, BY - halfGap - 4, wl.w, 4);
    ctx.fillRect(wl.x, BY + halfGap, wl.w, 4);
  }

  if (state !== 'over') drawBlob();

  // particles
  ctx.fillStyle = '#38bdf8';
  for (const q of particles) {
    ctx.globalAlpha = Math.max(0, 1 - q.t / 1.2);
    ctx.beginPath(); ctx.arc(q.x, q.y, 4, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // popups
  ctx.textAlign = 'center';
  for (const pp of popups) {
    ctx.globalAlpha = Math.max(0, 1 - pp.t);
    ctx.fillStyle = pp.color;
    ctx.font = 'bold 24px system-ui, sans-serif';
    ctx.fillText(pp.text, pp.x, pp.y);
  }
  ctx.globalAlpha = 1;

  // air meter
  const mw = 220, mx = (W - mw) / 2, my = H - 46;
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.fillRect(mx, my, mw, 12);
  ctx.fillStyle = forcedBig ? '#f87171' : (air < 30 ? '#fbbf24' : '#38bdf8');
  ctx.fillRect(mx, my, mw * (air / AIR_MAX), 12);
  ctx.fillStyle = '#8ea0b8'; ctx.font = '12px system-ui, sans-serif';
  ctx.fillText('AIR', W / 2, my - 6);

  // HUD
  ctx.fillStyle = '#fff'; ctx.font = 'bold 44px system-ui, sans-serif';
  ctx.fillText(String(score), W / 2, 70);
  ctx.font = '14px system-ui, sans-serif'; ctx.fillStyle = '#8ea0b8';
  ctx.fillText('BEST ' + best, W / 2, 95);

  ctx.fillStyle = '#dbeafe'; ctx.font = 'bold 20px system-ui, sans-serif';
  if (state === 'menu') {
    ctx.font = 'bold 40px system-ui, sans-serif'; ctx.fillStyle = '#38bdf8';
    ctx.fillText('SQUEEZE', W / 2, 250);
    ctx.font = '16px system-ui, sans-serif'; ctx.fillStyle = '#dbeafe';
    ctx.fillText('HOLD to squeeze small and slip through gaps.', W / 2, 292);
    ctx.fillText('Squeezing burns AIR — release to refill.', W / 2, 316);
    ctx.font = 'bold 20px system-ui, sans-serif';
    ctx.fillText('TAP TO START', W / 2, 420);
  } else if (state === 'over') {
    ctx.fillStyle = 'rgba(16,20,24,0.85)';
    ctx.fillRect(40, 230, W - 80, 220);
    ctx.fillStyle = '#f87171'; ctx.font = 'bold 30px system-ui, sans-serif';
    ctx.fillText('POPPED!', W / 2, 285);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 24px system-ui, sans-serif';
    ctx.fillText('Score ' + score + '   Best ' + best, W / 2, 330);
    ctx.fillStyle = '#6ee7b7'; ctx.font = 'bold 20px system-ui, sans-serif';
    ctx.fillText('TAP TO TRY AGAIN', W / 2, 400);
  }
  ctx.restore();
}

// ---------- loop ----------
let last = performance.now();
function frame(now){
  const dt = Math.min(0.033, (now - last) / 1000);
  last = now;
  update(dt);
  draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
