# codemagic.yaml — TAKE 47 iOS build → TestFlight (PIPELINE.md step 5)
# Prereqs (Dan, one-time, in Codemagic's UI): connect the App Store Connect
# API key under Teams → Integrations and name it exactly "take47-asc-key".
# Then in Codemagic: Add application → this repo → "Codemagic YAML" mode.
workflows:
  ios-testflight:
    name: TAKE 47 → TestFlight
    max_build_duration: 45
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: take47-asc-key
    environment:
      xcode: latest
      node: 22       # Capacitor 8 CLI hard-requires Node >= 22 (build #3 lesson)
      # automatic signing via the ASC integration: Codemagic creates AND stores
      # the distribution certificate + App Store profile itself — no private
      # key secret needed. (Builds #1/#2 only failed on this path because the
      # integration was misnamed at the time; build #4 showed the script path
      # needs a CERTIFICATE_PRIVATE_KEY secret we'd rather not manage.)
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.dmiceli.take47
    triggering:
      events: []                 # manual "Start new build" while we stabilize;
                                 # switch to push-triggered once the first build is green
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Sync web game into the iOS shell
        script: npx cap sync ios
      - name: Apply signing profiles to the Xcode project
        script: xcode-project use-profiles
      - name: Stamp build number
        script: |
          cd ios/App
          agvtool new-version -all $PROJECT_BUILD_NUMBER
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
