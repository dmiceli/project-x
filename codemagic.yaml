# codemagic.yaml — TAKE 47 iOS build → TestFlight (PIPELINE.md step 5)
# Prereqs (Dan, one-time, in Codemagic's UI): connect the App Store Connect
# API key under Teams → Integrations and name it exactly "take47-asc-key".
# Then in Codemagic: Add application → this repo → "Codemagic YAML" mode.
workflows:
  ios-testflight:
    name: TAKE 47 → TestFlight
    max_build_duration: 45
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: take47-asc-key
    environment:
      xcode: latest
      node: 20
      vars:
        BUNDLE_ID: com.dmiceli.take47
    triggering:
      events: []                 # manual "Start new build" while we stabilize;
                                 # switch to push-triggered once the first build is green
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Sync web game into the iOS shell
        script: npx cap sync ios
      - name: Fetch or CREATE signing files via App Store Connect
        # first build on a fresh Apple account: --create makes the distribution
        # certificate + App Store provisioning profile through the API key.
        # (The environment ios_signing block only FETCHES already-stored files —
        # that's what failed builds #1/#2 before any step ran.)
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Stamp build number
        script: |
          cd ios/App
          agvtool new-version -all $PROJECT_BUILD_NUMBER
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
