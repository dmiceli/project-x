<!DOCTYPE html>
<!--
  TAKE 47 — v1 app (full game; becomes the Capacitor web root in Phase 5)

  Architecture: single-file. Canvas renders gameplay only; all menus/settings
  are real HTML buttons (VoiceOver/keyboard accessible). Systems: versioned
  save → genres (6 sets, cached offscreen) → characters (1 rig, 6 costumes) →
  audio → engine (campaign + daily modes) → achievements → share card → UI.

  PRIVACY: fully offline. One localStorage key holds all game state; no
  network requests, no analytics, no identifiers, no third-party code.
  (Ad SDK arrives in Phase 5 behind Capacitor; see PRIVACY.md.)

  ACCESSIBILITY: outcomes pair color with text labels; reduce-motion setting
  kills shake/flash (no strobing anywhere); sound optional; menu UI is native
  HTML with aria-pressed toggles and a polite live region for achievement
  toasts; touch targets ≥48px; canvas gameplay itself is one-tap.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>TAKE 47</title>
<style>
  :root{
    --bg:#191010; --panel:#241515; --ink:#e8d5b5; --dim:#a08b72;
    --gold:#ffd166; --good:#6ee7b7; --bad:#f87171; --purple:#c084fc;
  }
  html,body{margin:0;padding:0;background:var(--bg);height:100%;overflow:hidden;
    touch-action:none;-webkit-user-select:none;user-select:none;
    font-family:system-ui,-apple-system,sans-serif;color:var(--ink)}
  canvas{display:block;margin:0 auto;touch-action:none}

  /* ---- overlay screens (real HTML for screen readers) ---- */
  .screen{position:fixed;inset:0;background:var(--bg);display:none;
    flex-direction:column;align-items:center;justify-content:flex-start;
    padding:max(24px,env(safe-area-inset-top)) 24px max(24px,env(safe-area-inset-bottom));
    overflow-y:auto;z-index:10}
  .screen.active{display:flex}
  h1{font-family:Georgia,serif;color:var(--gold);font-size:52px;margin:40px 0 0;letter-spacing:2px}
  h2{font-family:Georgia,serif;color:var(--gold);font-size:30px;margin:16px 0 12px}
  .tag{color:var(--dim);margin:4px 0 28px;font-size:15px}
  .stats{color:var(--dim);font-size:14px;margin-bottom:24px;text-align:center;line-height:1.7}
  button{display:block;width:min(320px,86vw);min-height:52px;margin:7px auto;
    background:var(--panel);color:var(--ink);border:1.5px solid var(--dim);
    border-radius:10px;font-size:17px;font-weight:600;cursor:pointer;padding:10px}
  button.primary{background:var(--gold);color:#191010;border-color:var(--gold);font-size:19px}
  button.back{border-color:transparent;color:var(--dim);margin-top:18px}
  button:disabled{opacity:.45;cursor:default}
  button[aria-pressed="true"]{border-color:var(--good);color:var(--good)}
  a{color:var(--dim);font-size:14px;margin-top:10px}

  .card{width:min(340px,88vw);background:var(--panel);border:1px solid #3a2a22;
    border-radius:12px;padding:12px 16px;margin:6px auto;text-align:left}
  .card h3{margin:0 0 2px;font-size:16px;color:var(--ink)}
  .card p{margin:0;font-size:13px;color:var(--dim)}
  .card.locked{opacity:.5}
  .card.done{border-color:var(--gold)}
  .card .who{float:right;font-size:26px;line-height:1}

  /* ---- in-game bottom bar (share/home on the CUT screen) ---- */
  #gameBar{position:fixed;left:0;right:0;bottom:max(14px,env(safe-area-inset-bottom));
    display:none;justify-content:center;gap:12px;z-index:5}
  #gameBar.active{display:flex}
  #gameBar button{width:150px;margin:0}

  /* ---- achievement / info toast (aria-live announces it) ---- */
  #toast{position:fixed;top:max(16px,env(safe-area-inset-top));left:50%;
    transform:translateX(-50%) translateY(-120%);transition:transform .25s ease;
    background:var(--panel);border:1.5px solid var(--gold);color:var(--gold);
    padding:12px 22px;border-radius:12px;font-weight:700;font-size:15px;z-index:20;
    max-width:86vw;text-align:center}
  #toast.show{transform:translateX(-50%) translateY(0)}
  @media (prefers-reduced-motion: reduce){ #toast{transition:none} }

  /* ---- interstitial celebration cards (genre moves, cast unlocks) ---- */
  #interstitial{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;
    justify-content:center;background:rgba(10,7,5,.94);z-index:15;text-align:center;padding:24px}
  #interstitial.active{display:flex}
  #interstitial .kicker{color:var(--dim);letter-spacing:3px;font-size:13px;margin:0}
  #interstitial .big{font-size:72px;margin:10px 0;line-height:1}
  #interstitial h2{margin:4px 0 6px;font-size:34px}
  #interstitial p{color:var(--dim);margin:0 0 22px;font-size:15px;max-width:320px}
</style>
</head>
<body>
<canvas id="c"></canvas>

<section id="scr-home" class="screen active" aria-label="TAKE 47 home">
  <h1>TAKE 47</h1>
  <p class="tag">a stunt double's life</p>
  <p class="stats" id="homeStats"></p>
  <button id="btnPlay" class="primary">ACTION!</button>
  <button id="btnDaily">🎬 DAILY CHALLENGE</button>
  <button id="btnCast">🎭 THE CAST</button>
  <button id="btnTrophies">🏆 BLOOPER REEL</button>
  <button id="btnShareHome">📤 SHARE MY PROGRESS</button>
  <button id="btnSettings">⚙️ SETTINGS</button>
</section>

<section id="scr-daily" class="screen" aria-label="Daily challenge">
  <h2>DAILY CHALLENGE</h2>
  <p class="stats">Three lives per attempt. Same gauntlet as the whole world.<br>Three crashes and it's a wrap.</p>
  <p class="stats" id="dailyInfo"></p>
  <button id="btnDailyPlay" class="primary">SHOOT TODAY'S GAUNTLET</button>
  <button id="btnDailyAd">🎞️ EXTRA ATTEMPT (ad — placeholder in beta)</button>
  <button class="back" data-to="home">← BACK</button>
</section>

<section id="scr-cast" class="screen" aria-label="Character selection">
  <h2>THE CAST</h2>
  <p class="stats">Unlock by reaching scenes. Tap to choose your double.</p>
  <div id="castList"></div>
  <button class="back" data-to="home">← BACK</button>
</section>

<section id="scr-trophies" class="screen" aria-label="Achievements">
  <h2>BLOOPER REEL</h2>
  <div id="trophyList"></div>
  <button class="back" data-to="home">← BACK</button>
</section>

<section id="scr-settings" class="screen" aria-label="Settings">
  <h2>SETTINGS</h2>
  <button id="tglSound" aria-pressed="true">SOUND: ON</button>
  <button id="tglHaptics" aria-pressed="true">HAPTICS: ON (phone builds)</button>
  <button id="tglMotion" aria-pressed="false">REDUCE MOTION: OFF</button>
  <button id="btnReset">🔄 RESHOOT FROM SCENE 1</button>
  <button id="btnRestore" disabled>RESTORE PURCHASES (App Store build)</button>
  <a href="../PRIVACY.md" target="_blank" rel="noopener">Privacy policy</a>
  <button class="back" data-to="home">← BACK</button>
</section>

<div id="interstitial" role="dialog" aria-modal="true" aria-label="Milestone">
  <p class="kicker" id="cardKicker"></p>
  <div class="big" id="cardIcon">🎬</div>
  <h2 id="cardTitle"></h2>
  <p id="cardBody"></p>
  <div id="cardButtons"></div>
</div>
<div id="gameBar">
  <button id="btnShare" class="primary">📤 SHARE</button>
  <button id="btnHome">🏠 HOME</button>
</div>
<div id="toast" role="status" aria-live="polite"></div>

<script>
'use strict';

// ========== config ==========
const W = 400, H = 700, GROUND = 600;
const GRAVITY = 1400;
const PERFECT_RAD = 10 * Math.PI / 180;
const HITSTOP = 0.06;
const START_X = 70;
const DT_MAX = 0.033;
const DAILY_FREE = 3, DAILY_AD_MAX = 3;
// Anti-cheese: lock is unavailable until this much rotation has happened.
// Without it, tap-tap instantly freezes the angle at ~0° for a free landing.
const MIN_SPIN = 200 * Math.PI / 180;

// ========== save system (single versioned blob; local-only) ==========
const SAVE_KEY = 't47_save_v1';
const DEFAULTS = {
  scene: 1, furthest: 1, takes: 0, prints: 0, crashes: 0,
  bestStreak: 0, firstTakeChain: 0,
  selected: 'guy', unlocked: ['guy'],
  ach: {},                                    // id -> timestamp
  daily: {date: '', used: 0, adExtras: 0, best: 0, todayBest: 0},
  set: {sound: 1, haptics: 1, rm: 0}
};
let S;
function loadSave(){
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) { S = Object.assign({}, DEFAULTS, JSON.parse(raw));
      S.daily = Object.assign({}, DEFAULTS.daily, S.daily);
      S.set = Object.assign({}, DEFAULTS.set, S.set);
      return; }
    // migrate from prototype's scattered keys, then start clean
    S = JSON.parse(JSON.stringify(DEFAULTS));
    const legacy = k => parseInt(localStorage.getItem(k) || '0', 10) || 0;
    if (legacy('t47_scene') > 1) {
      S.scene = legacy('t47_scene'); S.furthest = Math.max(S.scene, legacy('t47_furthest'));
      S.takes = legacy('t47_takes'); S.prints = legacy('t47_prints');
      S.set.rm = legacy('t47_rm'); S.set.sound = localStorage.getItem('t47_sound') === '0' ? 0 : 1;
    }
  } catch (e) { S = JSON.parse(JSON.stringify(DEFAULTS)); }
}
function persist(){ try { localStorage.setItem(SAVE_KEY, JSON.stringify(S)); } catch (e) {} }
loadSave();

// ========== deterministic scene design ==========
function mulberry32(a){
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
// campaign: seeded by scene number only — everyone's Scene N is identical
function sceneParams(n){
  const rnd = mulberry32(n * 2654435761 >>> 0);
  const dir = rnd() < 0.5 ? 1 : -1;
  let spinDeg = Math.min(880, 280 + n * 28 + rnd() * 80);
  const T = 1.15 + rnd() * 0.35;
  const big = (n % 10 === 0);
  if (big) spinDeg *= 1.15;
  const goodDeg = Math.max(15, 30 - n * 1.2);
  return {om: dir * spinDeg * Math.PI / 180, T: T, big: big, tol: goodDeg * Math.PI / 180};
}
// daily: seeded by date + step so the whole world shoots the same gauntlet;
// ramps faster than campaign because attempts are scarce
function dailySeed(){
  const d = new Date();
  const s = d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
  return (s * 2654435761) >>> 0;
}
function dailyParams(step){
  const rnd = mulberry32((dailySeed() ^ (step * 40503)) >>> 0);
  const dir = rnd() < 0.5 ? 1 : -1;
  const spinDeg = Math.min(900, 320 + step * 45 + rnd() * 90);
  const T = 1.1 + rnd() * 0.35;
  const goodDeg = Math.max(14, 28 - step * 1.6);
  return {om: dir * spinDeg * Math.PI / 180, T: T, big: step % 5 === 0, tol: goodDeg * Math.PI / 180};
}
function todayStr(){ return new Date().toISOString().slice(0, 10); }
function dailyRollover(){                      // reset counters on a new day
  if (S.daily.date !== todayStr()) {
    S.daily.date = todayStr(); S.daily.used = 0; S.daily.adExtras = 0; S.daily.todayBest = 0;
    persist();
  }
}

// ========== genres: six sets on one cached-background system ==========
// Trope-level only (see THEME.md IP guardrails). The rig/spotlight/camera/
// floor are drawn for every genre — it's always a film set; only the
// backdrop and props change. Set switches every 10 scenes, cycling.
const GENRES = [
  {id:'studio',  name:'THE BACKLOT',      sky:['#1a0f0d','#2a1a12','#191010'], floor:'#241811', props: propsStudio},
  {id:'western', name:'DUST GULCH',       sky:['#2b1608','#4a2410','#241208'], floor:'#3a2a14', props: propsWestern},
  {id:'pirate',  name:'THE HIGH SEAS',    sky:['#0a1a2f','#14304f','#0d1626'], floor:'#2a2118', props: propsPirate},
  {id:'scifi',   name:'SAUCER STAGE',     sky:['#120b24','#251448','#0f0a1c'], floor:'#1e1830', props: propsScifi},
  {id:'noir',    name:'RAIN STREET',      sky:['#0d0d12','#1a1a24','#0b0b10'], floor:'#15151d', props: propsNoir},
  {id:'kaiju',   name:'MINIATURE CITY',   sky:['#0c1a12','#173626','#0a140e'], floor:'#1c2418', props: propsKaiju}
];
function genreForScene(n){ return GENRES[Math.floor((n - 1) / 10) % GENRES.length]; }

function propsStudio(c){
  // painted flats leaning against the back wall
  c.fillStyle = 'rgba(255,209,102,0.06)';
  c.fillRect(300, GROUND - 130, 70, 130);
  c.strokeStyle = '#3a2c22'; c.lineWidth = 3;
  c.strokeRect(300, GROUND - 130, 70, 130);
}
function propsWestern(c){
  // saloon facade — with visible support braces (it's a set, always)
  c.fillStyle = '#4a3018';
  c.fillRect(290, GROUND - 150, 96, 150);
  c.fillStyle = '#2b1608';
  c.fillRect(302, GROUND - 128, 28, 40); c.fillRect(346, GROUND - 128, 28, 40);
  c.strokeStyle = '#241208'; c.lineWidth = 4;
  c.beginPath(); c.moveTo(290, GROUND - 150); c.lineTo(250, GROUND); c.stroke();   // brace
  // cactus silhouette
  c.fillStyle = '#1e2a12';
  c.fillRect(30, GROUND - 60, 10, 60); c.fillRect(20, GROUND - 44, 8, 22); c.fillRect(42, GROUND - 50, 8, 26);
}
function propsPirate(c){
  // mast, boom and rigging in front of a wavy painted backdrop
  c.strokeStyle = '#2a2118'; c.lineWidth = 8;
  c.beginPath(); c.moveTo(340, GROUND); c.lineTo(340, 120); c.stroke();
  c.lineWidth = 4;
  c.beginPath(); c.moveTo(340, 160); c.lineTo(250, 240); c.stroke();
  c.lineWidth = 1.5; c.strokeStyle = 'rgba(232,213,181,0.25)';
  for (const dx of [-60, -30, 30, 60]) { c.beginPath(); c.moveTo(340, 130); c.lineTo(340 + dx, GROUND); c.stroke(); }
  c.strokeStyle = 'rgba(56,130,180,0.35)'; c.lineWidth = 3;
  for (let y = 200; y < 320; y += 26) { c.beginPath(); c.moveTo(0, y); c.quadraticCurveTo(50, y - 12, 100, y); c.quadraticCurveTo(150, y + 12, 200, y); c.stroke(); }
}
function propsScifi(c){
  // flying saucer on a very visible string + cardboard planet
  c.strokeStyle = 'rgba(232,213,181,0.5)'; c.lineWidth = 1.5;
  c.beginPath(); c.moveTo(300, 26); c.lineTo(300, 120); c.stroke();
  c.fillStyle = '#3f3358';
  c.beginPath(); c.ellipse(300, 130, 46, 14, 0, 0, Math.PI * 2); c.fill();
  c.fillStyle = '#585078';
  c.beginPath(); c.ellipse(300, 120, 20, 12, 0, Math.PI, 0); c.fill();
  c.fillStyle = '#241a3e';
  c.beginPath(); c.arc(70, 180, 34, 0, Math.PI * 2); c.fill();
  c.strokeStyle = '#3a2f5c'; c.lineWidth = 5;
  c.beginPath(); c.ellipse(70, 180, 48, 12, -0.35, 0, Math.PI * 2); c.stroke();
  c.fillStyle = 'rgba(255,255,255,0.5)';
  for (let i = 0; i < 22; i++) c.fillRect((i * 73) % W, (i * 137) % 300 + 30, 2, 2);
}
function propsNoir(c){
  // brick wall, generic neon sign, venetian-blind light slats, static rain
  c.fillStyle = '#181820'; c.fillRect(250, GROUND - 170, 150, 170);
  c.strokeStyle = '#101017'; c.lineWidth = 1;
  for (let y = GROUND - 170; y < GROUND; y += 12) { c.beginPath(); c.moveTo(250, y); c.lineTo(400, y); c.stroke(); }
  c.fillStyle = '#ff5c8a';
  c.font = 'bold 22px Georgia, serif'; c.textAlign = 'center';
  c.fillText('HOTEL', 325, GROUND - 120);
  c.fillStyle = 'rgba(255,92,138,0.12)'; c.fillRect(285, GROUND - 140, 80, 28);
  c.fillStyle = 'rgba(232,213,181,0.05)';
  for (let y = 80; y < 300; y += 24) c.fillRect(0, y, 180, 9);      // slats
  c.strokeStyle = 'rgba(150,170,200,0.18)'; c.lineWidth = 1;
  for (let i = 0; i < 40; i++) { const x = (i * 53) % W, y = (i * 97) % 400; c.beginPath(); c.moveTo(x, y); c.lineTo(x - 4, y + 14); c.stroke(); }
}
function propsKaiju(c){
  // miniature skyline the double towers over + rubber monster arm in frame
  c.fillStyle = '#101a14';
  const bl = [[20,46],[52,70],[86,38],[116,58],[150,44],[300,52],[336,72],[368,40]];
  for (const [x, h] of bl) {
    c.fillRect(x, GROUND - h, 26, h);
    c.fillStyle = 'rgba(255,230,150,0.25)';
    for (let wy = GROUND - h + 6; wy < GROUND - 6; wy += 10) { c.fillRect(x + 5, wy, 4, 4); c.fillRect(x + 16, wy, 4, 4); }
    c.fillStyle = '#101a14';
  }
  c.fillStyle = '#1f3a26';                                          // the arm
  c.beginPath();
  c.moveTo(400, 190); c.quadraticCurveTo(330, 200, 315, 260);
  c.quadraticCurveTo(345, 265, 400, 250); c.closePath(); c.fill();
  c.fillStyle = '#2e5237';
  for (const [sx, sy] of [[355, 215], [372, 205], [385, 225]]) { c.beginPath(); c.arc(sx, sy, 6, 0, Math.PI * 2); c.fill(); }
}

// ========== canvas scaling + cached set ==========
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
let SCALE = 1, setCache = null, cachedGenreId = null;

function buildSetCache(genre){
  if (typeof document.createElement !== 'function') return;   // headless-test guard
  const k = Math.min(3, (window.devicePixelRatio || 1) * SCALE);
  setCache = document.createElement('canvas');
  setCache.width = Math.max(1, Math.round(W * k));
  setCache.height = Math.max(1, Math.round(H * k));
  cachedGenreId = genre.id;
  const c = setCache.getContext('2d');
  c.scale(k, k);

  const grad = c.createLinearGradient(0, 0, 0, H);              // genre backdrop
  grad.addColorStop(0, genre.sky[0]); grad.addColorStop(0.7, genre.sky[1]); grad.addColorStop(1, genre.sky[2]);
  c.fillStyle = grad; c.fillRect(0, 0, W, H);

  genre.props(c);                                               // genre props (behind set gear)

  c.strokeStyle = '#3a2c22'; c.lineWidth = 4;                   // it's ALWAYS a film set:
  c.beginPath(); c.moveTo(0, 26); c.lineTo(W, 26); c.stroke();  // lighting rig...
  for (const lx of [60, 180, 300]) {
    c.fillStyle = '#4a3626'; c.fillRect(lx - 8, 28, 16, 14);
    c.fillStyle = '#ffd166'; c.fillRect(lx - 5, 40, 10, 3);
  }
  const cone = c.createLinearGradient(0, 40, 0, GROUND);        // ...spotlight...
  cone.addColorStop(0, 'rgba(255,209,102,0.13)'); cone.addColorStop(1, 'rgba(255,209,102,0.02)');
  c.fillStyle = cone;
  c.beginPath(); c.moveTo(180, 44); c.lineTo(300, 44); c.lineTo(390, GROUND); c.lineTo(120, GROUND); c.closePath(); c.fill();
  c.fillStyle = '#0d0806';                                      // ...camera...
  c.fillRect(14, GROUND - 78, 34, 22);
  c.beginPath(); c.arc(52, GROUND - 67, 9, 0, Math.PI * 2); c.fill();
  c.strokeStyle = '#0d0806'; c.lineWidth = 5;
  c.beginPath(); c.moveTo(31, GROUND - 56); c.lineTo(18, GROUND); c.stroke();
  c.beginPath(); c.moveTo(31, GROUND - 56); c.lineTo(44, GROUND); c.stroke();
  c.fillStyle = genre.floor; c.fillRect(0, GROUND, W, H - GROUND);   // ...floor, mat, tape
  c.fillStyle = '#2e4a6b'; c.fillRect(170, GROUND, 220, 16);
  c.fillStyle = 'rgba(255,255,255,0.08)'; c.fillRect(170, GROUND, 220, 4);
  c.save();
  c.beginPath(); c.rect(0, GROUND - 3, W, 3); c.clip();
  c.fillStyle = '#ffd166';
  for (let x = -20; x < W + 20; x += 24) { c.save(); c.translate(x, GROUND - 3); c.rotate(0.6); c.fillRect(0, -6, 8, 16); c.restore(); }
  c.restore();
}
function resize(){
  const dpr = window.devicePixelRatio || 1;
  SCALE = Math.min(window.innerWidth / W, window.innerHeight / H);
  cv.width = Math.round(W * SCALE * dpr);
  cv.height = Math.round(H * SCALE * dpr);
  cv.style.width = (W * SCALE) + 'px';
  cv.style.height = (H * SCALE) + 'px';
  ctx.setTransform(SCALE * dpr, 0, 0, SCALE * dpr, 0, 0);
  buildSetCache(currentGenre());
}

// ========== characters: one rig, six costumes ==========
const COSTUMES = [
  {id:'guy',    name:'Stunt Guy',        icon:'🤸', unlock:0,   suit:'#ffd166', skin:'#ffd9a0', shoe:'#ef476f', acc:null},
  {id:'gal',    name:'Stunt Gal',        icon:'💫', unlock:10,  suit:'#f472b6', skin:'#ffd9a0', shoe:'#ffffff', acc:'pony'},
  {id:'dummy',  name:'Crash-Test Dummy', icon:'🎯', unlock:25,  suit:'#e5e7eb', skin:'#e5e7eb', shoe:'#111111', acc:'dummy'},
  {id:'hotdog', name:'Hot-Dog Guy',      icon:'🌭', unlock:50,  suit:'#f59e0b', skin:'#ffd9a0', shoe:'#dc2626', acc:'bun'},
  {id:'legend', name:'The Aging Legend', icon:'🦳', unlock:75,  suit:'#9ca3af', skin:'#e8c9a0', shoe:'#78350f', acc:'grayhair'},
  {id:'diva',   name:'The Diva',         icon:'🕶️', unlock:100, suit:'#c084fc', skin:'#ffd9a0', shoe:'#fbbf24', acc:'glasses'}
];
function costume(){ return COSTUMES.find(x => x.id === S.selected) || COSTUMES[0]; }
// returns newly unlocked costumes so advance() can celebrate them properly
function checkUnlocks(){
  const fresh = [];
  for (const cst of COSTUMES) {
    if (cst.unlock > 0 && S.scene >= cst.unlock && !S.unlocked.includes(cst.id)) {
      S.unlocked.push(cst.id);
      fresh.push(cst);
    }
  }
  if (S.unlocked.length === COSTUMES.length) award('fullCast');
  return fresh;
}

// ========== audio (synth placeholder; unlocks on first gesture) ==========
let AC = null;
function ac(){
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}
function tone(f0, f1, dur, type, vol, delay){
  if (!S.set.sound) return;
  const a = ac(); if (!a) return;
  const t0 = a.currentTime + (delay || 0);
  const o = a.createOscillator(), g = a.createGain();
  o.type = type;
  o.frequency.setValueAtTime(f0, t0);
  o.frequency.exponentialRampToValueAtTime(Math.max(1, f1), t0 + dur);
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g); g.connect(a.destination);
  o.start(t0); o.stop(t0 + dur);
}
function noise(dur, vol, delay){
  if (!S.set.sound) return;
  const a = ac(); if (!a) return;
  const n = Math.floor(a.sampleRate * dur);
  const b = a.createBuffer(1, n, a.sampleRate);
  const d = b.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
  const s = a.createBufferSource(); s.buffer = b;
  const g = a.createGain(); g.gain.value = vol;
  s.connect(g); g.connect(a.destination);
  s.start(a.currentTime + (delay || 0));
}
const sfx = {
  clap:    () => { noise(0.03, 0.35); noise(0.05, 0.3, 0.05); },
  jump:    () => tone(180, 520, 0.25, 'sine', 0.15, 0.08),
  lock:    () => tone(950, 700, 0.06, 'square', 0.08),
  land:    () => { tone(200, 130, 0.14, 'triangle', 0.22); noise(0.06, 0.08); },
  perfect: () => { tone(660, 660, 0.09, 'sine', 0.14); tone(880, 880, 0.09, 'sine', 0.14, 0.09); tone(1320, 1320, 0.14, 'sine', 0.14, 0.18); },
  advance: () => { tone(523, 523, 0.1, 'sine', 0.12); tone(659, 659, 0.1, 'sine', 0.12, 0.1); tone(784, 784, 0.18, 'sine', 0.12, 0.2); },
  crash:   () => { noise(0.3, 0.3); tone(300, 55, 0.4, 'sawtooth', 0.18); },
  cut:     () => tone(500, 350, 0.25, 'square', 0.12, 0.25)
};

// ========== engine state ==========
// mode: 'campaign' (persistent scenes) | 'daily' (one life, date-seeded)
// state: home | ready | air | landed | crash | over
let mode = 'campaign';
let state = 'home';                  // + 'card' while an interstitial is up
let dStep = 1;                       // daily: current gauntlet step
let dLives = 3;                      // daily: crashes left in this attempt
let cardQueue = [];                  // pending interstitial celebrations
let takesScene = 1;                  // campaign: attempts on current scene
let perfectStreak = 0;
let p = null;

let shake = 0, flash = 0, stateT = 0, hitstop = 0;
let quip = '', wasPerfect = false;
let params = sceneParams(S.scene);

function currentGenre(){ return mode === 'daily' ? GENRES[dailySeed() % GENRES.length] : genreForScene(S.scene); }
function currentSceneNo(){ return mode === 'daily' ? dStep : S.scene; }
function refreshParams(){
  params = mode === 'daily' ? dailyParams(dStep) : sceneParams(S.scene);
  if (setCache && currentGenre().id !== cachedGenreId) buildSetCache(currentGenre());

function newPlayer(x){

// ========== gameplay ==========
function startJump(){
  S.takes++;
  const targetX = 250 + Math.random() * 80;
  p.vx = (targetX - p.x) / params.T;
  p.vy = -GRAVITY * params.T / 2;
  p.om = params.om;
  p.locked = false;
  p.spun = 0;                          // rotation accrued (gates the lock)
  p.pose = 'tuck';
  state = 'air';
  persist();
  sfx.clap(); sfx.jump();
}
function addPopup(text, x, y, color, size){
  popups.push({text: text, x: x, y: y, t: 0, color: color || '#fff', size: size || 26});
}
function dust(x, y, n){
  for (let i = 0; i < n; i++)
    particles.push({x: x + (Math.random()-0.5)*20, y: y, vx: (Math.random()<0.5?-1:1)*Math.random()*60, vy: -20 - Math.random()*60, t: 0, life: 0.5, color: '#b09a80', r: 2+Math.random()*2, g: 60});
}
function confetti(x, y){
  const colors = ['#ffd166', '#ef476f', '#6ee7b7', '#38bdf8', '#c084fc'];
  for (let i = 0; i < 30; i++) {
    const a = -Math.PI/2 + (Math.random()-0.5)*1.6, sp = 120 + Math.random()*220;
    particles.push({x: x, y: y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, t: 0, life: 1.1, color: colors[i%colors.length], r: 2.5+Math.random()*2, g: 500});
  }
}
function spawnRagdoll(){
  ragdoll = [];
  const parts = [{type:'head',ox:0,oy:-22},{type:'torso',ox:0,oy:0},{type:'arm',ox:-10,oy:-8},{type:'arm',ox:10,oy:-8},{type:'leg',ox:-6,oy:14},{type:'leg',ox:6,oy:14}];
  for (const pt of parts) {
    ragdoll.push({type: pt.type, x: p.x + pt.ox, y: p.y - 20 + pt.oy,
      vx: p.vx * 0.5 + (Math.random()-0.5)*260, vy: -120 - Math.random()*220,
      a: Math.random()*Math.PI*2, om: (Math.random()-0.5)*18});
  }
}

function evaluateLanding(){
  p.y = GROUND;
  let a = p.angle % (Math.PI * 2);
  if (a < 0) a += Math.PI * 2;
  const off = Math.min(a, Math.PI * 2 - a);
  hitstop = HITSTOP;
  if (off <= params.tol) {
    wasPerfect = off <= PERFECT_RAD;
    p.angle = 0; p.vx = 0; p.vy = 0; p.om = 0; p.squash = 1;
    p.pose = wasPerfect ? 'armsup' : 'stand';
    dust(p.x, GROUND, 8);
    haptic(30);
    if (wasPerfect) {
      perfectStreak++;
      S.prints++;
      S.bestStreak = Math.max(S.bestStreak, perfectStreak);
      confetti(p.x, GROUND - 40);
      addPopup('PRINT IT!', p.x, GROUND - 100, '#ffd166', 28);
      if (perfectStreak >= 2) addPopup('STREAK ×' + perfectStreak, p.x, GROUND - 135, '#c084fc', 20);
      sfx.perfect();
      award('firstPrint');
      if (perfectStreak >= 3) award('hatTrick');
      if (perfectStreak >= 5) award('onFire');
    } else {
      perfectStreak = 0;
      addPopup('CLEAN TAKE', p.x, GROUND - 100, '#6ee7b7');
      sfx.land();
    }
    persist();
    state = 'landed'; stateT = 0;
  } else {
    perfectStreak = 0;
    S.crashes++;
    if (S.crashes >= 100) award('frequentFlyer');
    spawnRagdoll();
    if (!S.set.rm) { shake = 1; flash = 1; }
    haptic([40, 40, 60]);
    quip = QUIPS[Math.floor(Math.random() * QUIPS.length)];
    addPopup('CUT!', p.x, GROUND - 120, '#f87171', 36);
    sfx.crash(); sfx.cut();
    persist();
    state = 'crash'; stateT = 0;
  }
}

// ========== interstitial cards ==========
// Big moments (set changes, cast unlocks) pause the flow behind a modal card
// the player must tap through — Dan's feedback: milestones were getting lost
// in the gameplay chaos. Cards queue so unlock + set-change both show.
function queueCard(cfg){ cardQueue.push(cfg); }
function showNextCard(){
  const el = document.getElementById('interstitial');
  if (!cardQueue.length) {
    el.classList.remove('active');
    state = 'ready'; stateT = 0;
    return;
  }
  state = 'card';
  const cfg = cardQueue.shift();
  document.getElementById('cardKicker').textContent = cfg.kicker || '';
  document.getElementById('cardIcon').textContent = cfg.icon || '🎬';
  document.getElementById('cardTitle').textContent = cfg.title;
  document.getElementById('cardBody').textContent = cfg.body || '';
  const bb = document.getElementById('cardButtons');
  bb.innerHTML = '';
  for (const btn of cfg.buttons) {
    const b = document.createElement('button');
    b.textContent = btn.label;
    if (btn.primary) b.className = 'primary';
    b.onclick = () => { if (btn.action) btn.action(); showNextCard(); };
    bb.appendChild(b);
  }
  el.classList.add('active');
  sfx.advance();
}

// scene/step advance after a landing settles (called from update)
function advance(){
  if (mode === 'campaign') {
    if (takesScene === 1) {                          // first-take bookkeeping
      S.firstTakeChain++;
      if (S.firstTakeChain >= 5) award('oneTake');
      if (params.big) award('directorsCut');
    } else S.firstTakeChain = 0;
    S.scene++;
    S.furthest = Math.max(S.furthest, S.scene);
    if (S.takes >= 500) award('methodActor');
    if (S.scene >= 50) award('longHaul');
    if (S.scene >= 100) award('franchise');
    const fresh = checkUnlocks();
    takesScene = 1;
    addPopup('SCENE ' + (S.scene - 1) + ' COMPLETE', W / 2, 300, wasPerfect ? '#ffd166' : '#6ee7b7', 24);
    for (const cst of fresh) {
      queueCard({kicker: 'NEW CAST MEMBER', icon: cst.icon, title: cst.name,
        body: 'Earned at Scene ' + cst.unlock + '. Put them in the spotlight?',
        buttons: [
          {label: '⭐ STAR THEM', primary: true, action: () => { S.selected = cst.id; persist(); }},
          {label: 'KEEP CURRENT'}
        ]});
    }
    const g = genreForScene(S.scene);
    if (genreForScene(S.scene - 1).id !== g.id) {
      queueCard({kicker: 'COMPANY MOVE', icon: '🎬', title: 'NEW SET: ' + g.name,
        body: 'The production moves on. The next ten scenes shoot here.',
        buttons: [{label: 'ACTION!', primary: true}]});
    }
    persist();
  } else {
    dStep++;
    addPopup('SCENE ' + (dStep - 1) + ' IN THE CAN', W / 2, 300, wasPerfect ? '#ffd166' : '#6ee7b7', 24);
  }
  refreshParams();
  p = newPlayer(START_X);
  sfx.advance();
  if (cardQueue.length) showNextCard();
  else { state = 'ready'; stateT = 0; }
}

// crash resolution differs by mode: campaign retries the same scene forever;
// a daily attempt burns one of 3 lives, then ends (scarcity keeps the score
// meaningful; 3 lives — Dan's call — keeps it replayable)
function afterCrash(){
  state = 'over'; stateT = 0;          // stateT reset: 0.6s input lockout on the
                                       // CUT screen so it can't be tapped past blind
  if (mode === 'daily') {
    dLives--;
    if (dLives <= 0) {
      const cleared = dStep - 1;
      S.daily.todayBest = Math.max(S.daily.todayBest, cleared);
      S.daily.best = Math.max(S.daily.best, cleared);
      persist();
      gameBar(true);                   // attempt over: share/home offered
    }
  } else {
    gameBar(true);
  }
}
function retry(){
  gameBar(false);
  if (mode === 'daily') {
    if (dLives > 0) {                  // lives remain: same run continues
      p = newPlayer(START_X);
      popups = []; ragdoll = [];
      state = 'ready';
    } else { showScreen('daily'); state = 'home'; }
    return;
  }
  takesScene++;
  S.firstTakeChain = 0;
  p = newPlayer(START_X);
  popups = []; ragdoll = [];
  state = 'ready';
}

// ========== canvas input (gameplay only; menus are HTML) ==========
function onTap(){
  ac();
  if (state === 'ready') startJump();
  else if (state === 'air' && !p.locked) {
    if (p.spun < MIN_SPIN) {           // no flip, no trick — reject the early lock
      addPopup('TOO SOON!', p.x, p.y - 55, '#f87171', 18);
      tone(220, 150, 0.08, 'square', 0.07);
    } else { p.locked = true; p.om = 0; p.pose = 'stand'; sfx.lock(); haptic(10); }
  }
  else if (state === 'over' && stateT > 0.6) retry();   // lockout: let the CUT screen land
  // state 'card': canvas taps ignored — the card's HTML buttons own the flow
}
cv.addEventListener('pointerdown', function(e){ e.preventDefault(); onTap(); });
window.addEventListener('keydown', function(e){ if (e.code === 'Space' && state !== 'home') onTap(); });
window.addEventListener('resize', resize);

// ========== update ==========
function update(dt){
  if (hitstop > 0) { hitstop -= dt; return; }
  stateT += dt;
  shake = Math.max(0, shake - dt * 3);
  flash = Math.max(0, flash - dt * 4);
  p.squash = Math.max(0, p.squash - dt * 4);

  if (state === 'air') {
    p.vy += GRAVITY * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.angle += p.om * dt;
    p.spun += Math.abs(p.om) * dt;
    if (p.vy > 0 && p.y >= GROUND) evaluateLanding();
  } else if (state === 'landed') {
    if (stateT > 1.0) advance();
  } else if (state === 'crash') {
    for (const q of ragdoll) {
      q.vy += GRAVITY * dt;
      q.x += q.vx * dt; q.y += q.vy * dt; q.a += q.om * dt;
      if (q.y > GROUND - 4) {
        q.y = GROUND - 4;
        if (Math.abs(q.vy) > 40) { q.vy = -q.vy * 0.4; q.vx *= 0.6; q.om *= 0.6; }
        else { q.vy = 0; q.vx *= 0.85; q.om *= 0.8; }
      }
    }
    if (stateT > 1.2) afterCrash();
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const q = particles[i];
    q.t += dt; q.x += q.vx * dt; q.y += q.vy * dt; q.vy += q.g * dt;
    if (q.t > q.life) particles.splice(i, 1);
  }
  for (let i = popups.length - 1; i >= 0; i--) {
    popups[i].t += dt; popups[i].y -= 30 * dt;
    if (popups[i].t > 1.4) popups.splice(i, 1);
  }
}

// ========== render: character (rig + costume accessories) ==========
const LINE = '#191010';
function limb(x1, y1, x2, y2, x3, y3, color, w){
  ctx.strokeStyle = color; ctx.lineWidth = w; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.lineTo(x3, y3); ctx.stroke();
}
function drawAccessory(cst, headY){
  if (cst.acc === 'pony' || cst.acc === 'grayhair') {
    ctx.strokeStyle = cst.acc === 'pony' ? '#7c2d12' : '#d4d4d8';
    ctx.lineWidth = 4; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(6, headY - 4); ctx.quadraticCurveTo(14, headY + 2, 12, headY + 10); ctx.stroke();
  } else if (cst.acc === 'dummy') {                     // crash-test target mark
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(0, headY, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fbbf24';
    ctx.beginPath(); ctx.moveTo(0, headY); ctx.arc(0, headY, 4, 0, Math.PI / 2); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(0, headY); ctx.arc(0, headY, 4, Math.PI, Math.PI * 1.5); ctx.closePath(); ctx.fill();
  } else if (cst.acc === 'bun') {                       // hot-dog bun halves
    ctx.fillStyle = '#eab308';
    ctx.beginPath(); ctx.ellipse(-9, 0, 4, 15, 0.1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(9, 0, 4, 15, -0.1, 0, Math.PI * 2); ctx.fill();
  } else if (cst.acc === 'glasses') {
    ctx.fillStyle = '#111';
    ctx.fillRect(-7, headY - 2, 5, 3); ctx.fillRect(2, headY - 2, 5, 3); ctx.fillRect(-2, headY - 1, 4, 1);
  }
}
function drawGuy(x, y, angle, pose, squash){
  const cst = costume();
  ctx.save();
  ctx.translate(x, y - 22);
  ctx.rotate(angle);
  const sq = (squash || 0) * 0.25;
  ctx.scale(1 + sq, 1 - sq);
  if (pose === 'tuck') {
    limb(-4, 10, -10, 16, 2, 20, cst.suit, 6);
    limb(4, 10, 12, 14, 4, 20, cst.suit, 6);
    ctx.fillStyle = cst.shoe;
    ctx.fillRect(-2, 17, 8, 6); ctx.fillRect(0, 17, 8, 6);
    ctx.fillStyle = cst.suit;
    ctx.beginPath(); ctx.ellipse(0, 0, 11, 14, 0, 0, Math.PI * 2); ctx.fill();
    limb(-8, -4, -12, 8, 0, 14, cst.skin, 5);
    limb(8, -4, 12, 8, 4, 14, cst.skin, 5);
    ctx.fillStyle = cst.skin;
    ctx.beginPath(); ctx.arc(0, -19, 8, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = LINE;
    ctx.beginPath(); ctx.arc(-3, -20, 1.5, 0, Math.PI*2); ctx.arc(3, -20, 1.5, 0, Math.PI*2); ctx.fill();
    drawAccessory(cst, -19);
  } else {
    limb(-4, 8, -5, 15, -5, 22, cst.suit, 6);
    limb(4, 8, 5, 15, 5, 22, cst.suit, 6);
    ctx.fillStyle = cst.shoe;
    ctx.fillRect(-10, 19, 9, 5); ctx.fillRect(2, 19, 9, 5);
    ctx.fillStyle = cst.suit;
    ctx.beginPath(); ctx.ellipse(0, -2, 9, 13, 0, 0, Math.PI * 2); ctx.fill();
    if (pose === 'armsup') {
      limb(-7, -8, -13, -16, -12, -26, cst.skin, 5);
      limb(7, -8, 13, -16, 12, -26, cst.skin, 5);
    } else {
      limb(-7, -8, -11, 0, -10, 8, cst.skin, 5);
      limb(7, -8, 11, 0, 10, 8, cst.skin, 5);
    }
    ctx.fillStyle = cst.skin;
    ctx.beginPath(); ctx.arc(0, -21, 8, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = LINE;
    ctx.beginPath(); ctx.arc(-3, -22, 1.5, 0, Math.PI*2); ctx.arc(3, -22, 1.5, 0, Math.PI*2); ctx.fill();
    if (pose === 'armsup') {
      ctx.strokeStyle = LINE; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(0, -19, 3.5, 0.1*Math.PI, 0.9*Math.PI); ctx.stroke();
    }
    drawAccessory(cst, -21);
  }
  ctx.restore();
}
function drawRagdollPart(q){
  const cst = costume();
  ctx.save();
  ctx.translate(q.x, q.y);
  ctx.rotate(q.a);
  if (q.type === 'head') {
    ctx.fillStyle = cst.skin;
    ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = LINE;
    ctx.font = 'bold 8px system-ui, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('×  ×', 0, 1);
  } else if (q.type === 'torso') {
    ctx.fillStyle = cst.suit;
    ctx.beginPath(); ctx.ellipse(0, 0, 9, 13, 0, 0, Math.PI*2); ctx.fill();
  } else if (q.type === 'arm') {
    limb(-6, 0, 0, 2, 6, 0, cst.skin, 5);
  } else {
    limb(-6, 0, 0, 2, 6, 0, cst.suit, 6);
    ctx.fillStyle = cst.shoe; ctx.fillRect(4, -3, 7, 5);
  }
  ctx.restore();
}

// ========== render: frame ==========
function slateStripes(x, y, w, h){
  ctx.save();
  ctx.beginPath(); ctx.rect(x, y, w, h); ctx.clip();
  ctx.fillStyle = '#fff';
  for (let i = 0, n = Math.ceil(w / 44) + 1; i < n; i++) {
    ctx.save(); ctx.translate(x + i * 44, y); ctx.rotate(0.5); ctx.fillRect(0, -8, 20, h + 20); ctx.restore();
  }
  ctx.restore();
}
function draw(){
  if (state === 'home') return;                    // HTML owns the screen
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  if (shake > 0) ctx.translate((Math.random() - 0.5) * 10 * shake, (Math.random() - 0.5) * 10 * shake);
  if (setCache) ctx.drawImage(setCache, 0, 0, W, H);

  if (state === 'crash' || (state === 'over' && ragdoll.length)) {
    for (const q of ragdoll) drawRagdollPart(q);
  } else if (state !== 'over') {
    drawGuy(p.x, p.y, p.angle, p.pose, p.squash);
  }

  for (const q of particles) {
    ctx.globalAlpha = Math.max(0, 1 - q.t / q.life);
    ctx.fillStyle = q.color;
    ctx.fillRect(q.x - q.r/2, q.y - q.r/2, q.r, q.r);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'center';
  for (const pop of popups){
    ctx.globalAlpha = Math.max(0, 1 - pop.t / 1.4);
    ctx.fillStyle = pop.color;
    ctx.font = 'bold ' + pop.size + 'px system-ui, sans-serif';
    ctx.fillText(pop.text, pop.x, pop.y);
  }
  ctx.globalAlpha = 1;

  if ((state === 'crash' || state === 'over') && quip) {
    ctx.fillStyle = '#e8d5b5';
    ctx.font = 'italic 17px Georgia, serif';
    ctx.fillText(quip, W / 2, 180);
    ctx.font = '13px system-ui, sans-serif';
    ctx.fillStyle = '#a08b72';
    ctx.fillText('— the director', W / 2, 202);
  }

  // HUD
  const g = currentGenre();
  ctx.fillStyle = '#c9a876'; ctx.font = 'bold 15px system-ui, sans-serif';
  ctx.fillText(mode === 'daily' ? 'DAILY · SCENE' : 'SCENE', W / 2, 46);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 48px system-ui, sans-serif';
  ctx.fillText(String(currentSceneNo()), W / 2, 92);
  ctx.fillStyle = '#c9a876'; ctx.font = '14px system-ui, sans-serif';
  if (mode === 'campaign') {
    ctx.fillText('TAKE ' + takesScene + ' OF THIS SCENE  ·  SET: ' + g.name, W / 2, 114);
    let line2 = 'LIFETIME ' + S.takes + '   ·   PRINTS ' + S.prints;
    if (S.furthest > S.scene) line2 += '   ·   FURTHEST ' + S.furthest;
    ctx.fillText(line2, W / 2, 133);
  } else {
    // lives shown as hearts AND a number — never color/symbol alone (a11y)
    ctx.fillText('LIVES ' + '♥'.repeat(Math.max(0, dLives)) + ' (' + dLives + ')  ·  CLEARED ' + (dStep - 1) + '  ·  TODAY\'S BEST ' + S.daily.todayBest, W / 2, 114);
  }
  if (params.big && state === 'ready') {
    ctx.fillStyle = '#ef476f'; ctx.font = 'bold 16px system-ui, sans-serif';
    ctx.fillText('★ BIG STUNT SCENE ★', W / 2, 156);
  }
  if (perfectStreak >= 2) {
    ctx.fillStyle = '#c084fc'; ctx.font = 'bold 15px system-ui, sans-serif';
    ctx.fillText('PERFECT STREAK ×' + perfectStreak, W / 2, 176);
  }

  ctx.fillStyle = '#e8d5b5'; ctx.font = 'bold 20px system-ui, sans-serif';
  if (state === 'ready') {
    ctx.fillText('ACTION!  (tap to jump)', W / 2, 420);
  } else if (state === 'air' && !p.locked) {
    ctx.fillStyle = 'rgba(232,213,181,0.7)';
    ctx.fillText('TAP TO STOP SPIN', W / 2, 660);
  } else if (state === 'over') {
    ctx.fillStyle = 'rgba(10,7,5,0.92)';
    ctx.fillRect(40, 240, W - 80, 220);
    slateStripes(40, 240, W - 80, 18);
    ctx.fillStyle = '#f87171'; ctx.font = 'bold 32px Georgia, serif';
    ctx.fillText('CUT!', W / 2, 305);
    ctx.fillStyle = '#e8d5b5'; ctx.font = '15px system-ui, sans-serif';
    if (mode === 'campaign') {
      ctx.fillText('SCENE ' + S.scene + '  ·  TAKE ' + takesScene, W / 2, 335);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 20px system-ui, sans-serif';
      ctx.fillText('Lifetime takes: ' + S.takes, W / 2, 372);
      ctx.fillStyle = '#6ee7b7';
      ctx.fillText('TAP FOR ONE MORE TAKE', W / 2, 420);
    } else if (dLives > 0) {
      ctx.fillText('LIVES LEFT: ' + dLives, W / 2, 335);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 20px system-ui, sans-serif';
      ctx.fillText('Cleared so far: ' + (dStep - 1), W / 2, 372);
      ctx.fillStyle = '#6ee7b7';
      ctx.fillText('TAP TO KEEP SHOOTING', W / 2, 420);
    } else {
      ctx.fillText('THAT\'S A WRAP ON THIS ATTEMPT', W / 2, 335);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 20px system-ui, sans-serif';
      ctx.fillText('Scenes cleared: ' + (dStep - 1) + '   Best today: ' + S.daily.todayBest, W / 2, 372);
      ctx.fillStyle = '#6ee7b7';
      ctx.fillText('TAP TO CONTINUE', W / 2, 420);
    }
  }
  if (flash > 0 && !S.set.rm) { ctx.fillStyle = 'rgba(248,113,113,' + (flash * 0.25) + ')'; ctx.fillRect(0, 0, W, H); }
  ctx.restore();
}

// ========== share card ==========
// A 1000×1250 slate image built on demand; Web Share API with download fallback.
function buildShareCard(){
  const s = document.createElement('canvas');
  s.width = 1000; s.height = 1250;
  const c = s.getContext('2d');
  c.fillStyle = '#111'; c.fillRect(0, 0, 1000, 1250);
  c.fillStyle = '#fff';
  for (let i = 0; i < 12; i++) { c.save(); c.translate(i * 96, 0); c.rotate(0.5); c.fillRect(0, -20, 44, 130); c.restore(); }
  c.textAlign = 'center';
  c.fillStyle = '#ffd166'; c.font = 'bold 110px Georgia, serif';
  c.fillText('TAKE 47', 500, 320);
  c.fillStyle = '#e8d5b5'; c.font = '42px system-ui, sans-serif';
  if (mode === 'daily') {
    c.fillText('TODAY\'S SHOOT', 500, 480);
    c.fillStyle = '#fff'; c.font = 'bold 180px system-ui, sans-serif';
    c.fillText(String(S.daily.todayBest), 500, 700);
    c.fillStyle = '#e8d5b5'; c.font = '42px system-ui, sans-serif';
    c.fillText('SCENES CLEARED · ONE LIFE', 500, 790);
  } else {
    c.fillText('STUCK ON SCENE', 500, 480);
    c.fillStyle = '#fff'; c.font = 'bold 180px system-ui, sans-serif';
    c.fillText(String(S.scene), 500, 700);
    c.fillStyle = '#e8d5b5'; c.font = '42px system-ui, sans-serif';
    c.fillText(S.takes + ' TAKES AND COUNTING', 500, 790);
  }
  c.fillStyle = '#a08b72'; c.font = 'italic 40px Georgia, serif';
  c.fillText(quip || '"One more take."', 500, 940);
  c.fillStyle = '#6ee7b7'; c.font = 'bold 44px system-ui, sans-serif';
  c.fillText('Your turn.', 500, 1090);
  return s;
}
async function shareCard(){
  try {
    const blob = await new Promise(res => buildShareCard().toBlob(res, 'image/png'));
    const file = new File([blob], 'take47.png', {type: 'image/png'});
    if (navigator.canShare && navigator.canShare({files: [file]})) {
      await navigator.share({files: [file], text: 'TAKE 47'});
    } else {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob); a.download = 'take47.png'; a.click();
      toast('Share image downloaded');
    }
  } catch (e) { /* user cancelled the share sheet — fine */ }
}

// ========== UI wiring ==========
const $ = id => document.getElementById(id);
function showScreen(name){
  for (const s of document.querySelectorAll('.screen')) s.classList.remove('active');
  if (name) { $('scr-' + name).classList.add('active'); state = 'home'; refreshHome(); }
}
function gameBar(on){ $('gameBar').classList.toggle('active', !!on); }
let toastTimer = null;
function toast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}
function refreshHome(){
  $('homeStats').textContent = 'Scene ' + S.scene + '  ·  ' + S.takes + ' lifetime takes  ·  ' + S.prints + ' prints' +
    (S.furthest > S.scene ? '  ·  record: Scene ' + S.furthest : '');
  $('btnPlay').textContent = 'ACTION! — SCENE ' + S.scene;
  dailyRollover();
  const left = DAILY_FREE + S.daily.adExtras - S.daily.used;
  $('dailyInfo').textContent = 'Attempts left today: ' + left + '  ·  Today\'s best: ' + S.daily.todayBest + '  ·  All-time: ' + S.daily.best;
  $('btnDailyPlay').disabled = left <= 0;
  $('btnDailyAd').disabled = S.daily.adExtras >= DAILY_AD_MAX;
  // cast
  const cl = $('castList'); cl.innerHTML = '';
  for (const cst of COSTUMES) {
    const owned = S.unlocked.includes(cst.id);
    const div = document.createElement('button');
    div.className = 'card' + (owned ? '' : ' locked') + (S.selected === cst.id ? ' done' : '');
    div.innerHTML = '<span class="who">' + cst.icon + '</span><h3>' + cst.name + (S.selected === cst.id ? ' ✓' : '') + '</h3><p>' +
      (owned ? 'Tap to select' : 'Unlocks at Scene ' + cst.unlock) + '</p>';
    div.disabled = !owned;
    div.onclick = () => { S.selected = cst.id; persist(); refreshHome(); toast('Now starring: ' + cst.name); };
    cl.appendChild(div);
  }
  // trophies
  const tl = $('trophyList'); tl.innerHTML = '';
  for (const a of ACH) {
    const got = !!S.ach[a.id];
    const div = document.createElement('div');
    div.className = 'card' + (got ? ' done' : ' locked');
    div.innerHTML = '<span class="who">' + (got ? '🏆' : '🔒') + '</span><h3>' + a.name + '</h3><p>' + a.desc + '</p>';
    tl.appendChild(div);
  }
  // settings labels
  $('tglSound').textContent = 'SOUND: ' + (S.set.sound ? 'ON' : 'OFF');
  $('tglSound').setAttribute('aria-pressed', String(!!S.set.sound));
  $('tglHaptics').textContent = 'HAPTICS: ' + (S.set.haptics ? 'ON' : 'OFF') + ' (phone builds)';
  $('tglHaptics').setAttribute('aria-pressed', String(!!S.set.haptics));
  $('tglMotion').textContent = 'REDUCE MOTION: ' + (S.set.rm ? 'ON' : 'OFF');
  $('tglMotion').setAttribute('aria-pressed', String(!!S.set.rm));
}
$('btnPlay').onclick = () => { ac(); playCampaign(); };
$('btnDaily').onclick = () => showScreen('daily');
$('btnDailyPlay').onclick = () => { ac(); playDaily(); };
$('btnDailyAd').onclick = () => {
  // REWARDED-AD PLACEHOLDER: real SDK arrives in Phase 5; same flow, real ad.
  const b = $('btnDailyAd');
  b.disabled = true; b.textContent = '🎞️ AD PLAYING (placeholder)…';
  setTimeout(() => {
    S.daily.adExtras++; persist();
    b.textContent = '🎞️ EXTRA ATTEMPT (ad — placeholder in beta)';
    refreshHome();
    toast('+1 attempt earned');
  }, 3000);
};
$('btnCast').onclick = () => showScreen('cast');
$('btnTrophies').onclick = () => showScreen('trophies');
$('btnSettings').onclick = () => showScreen('settings');
$('tglSound').onclick = () => { S.set.sound = S.set.sound ? 0 : 1; persist(); refreshHome(); };
$('tglHaptics').onclick = () => { S.set.haptics = S.set.haptics ? 0 : 1; persist(); refreshHome(); };
$('tglMotion').onclick = () => { S.set.rm = S.set.rm ? 0 : 1; persist(); refreshHome(); };
let resetArmed = false;
$('btnReset').onclick = () => {
  if (!resetArmed) {
    resetArmed = true;
    $('btnReset').textContent = '⚠️ SURE? Progress resets, record kept — tap again';
    setTimeout(() => { resetArmed = false; $('btnReset').textContent = '🔄 RESHOOT FROM SCENE 1'; }, 3000);
    return;
  }
  resetArmed = false;
  $('btnReset').textContent = '🔄 RESHOOT FROM SCENE 1';
  resetProgress();
  refreshHome();
};
$('btnShare').onclick = shareCard;
$('btnShareHome').onclick = () => { mode = 'campaign'; shareCard(); };
$('btnHome').onclick = () => { gameBar(false); popups = []; ragdoll = []; showScreen('home'); };
for (const b of document.querySelectorAll('.back')) b.onclick = () => showScreen(b.dataset.to);

// dev/test hook: lets the headless test driver inspect state (harmless in prod)
window.__t47 = { get: () => ({state, mode, dStep, dLives, takesScene, perfectStreak, cards: cardQueue.length, S}) };

// ========== main loop ==========
let last = performance.now();
function frame(now){
  const dt = Math.min(DT_MAX, (now - last) / 1000);
  last = now;
  update(dt);
  draw();
  requestAnimationFrame(frame);
}
resize();
refreshHome();
requestAnimationFrame(frame);
</script>
